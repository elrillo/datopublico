name: Daily ETLs (Legislativo + MercadoPublico)

on:
  schedule:
    - cron: '0 10 * * *' # 07:00 AM Chile
  workflow_dispatch:

jobs:
  run-legislativo:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run Legislative ETLs
      env:
        # Usa las variables específicas que esperan los scripts legislativos
        LEGISLATIVO_URL: ${{ secrets.LEGISLATIVO_URL }}
        LEGISLATIVO_SERVICE_ROLE_KEY: ${{ secrets.LEGISLATIVO_SERVICE_ROLE_KEY }}
        # Si algún script compartido usa SUPABASE_URL, deberíamos asegurarnos que no se confunda,
        # pero ahora todos los legislativos usan LEGISLATIVO_*.
      run: |
        cd scripts
        python run_all_etls.py

  run-mercadopublico:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run MercadoPublico ETLs
      env:
        # Credenciales para DatoPublico (Standard)
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        MERCADOPUBLICO_TICKET: ${{ secrets.MERCADOPUBLICO_TICKET }}
      run: |
        cd scripts
        python run_mp_etls.py
